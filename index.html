   ============================================================ */
const ShortcutsWindow = () => {
  const downloadPNG = () => {
    const c = document.createElement('canvas');
    c.width = 1000; c.height = 800;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle = '#00ffd0';
    ctx.font = 'bold 32px monospace';
    ctx.shadowColor = '#00ffd0'; ctx.shadowBlur = 12;
    ctx.fillText('HOLD IT DOWN — SHORTCUTS', 40, 60);
    ctx.shadowBlur = 0;
    ctx.font = '16px monospace';
    let y = 120;
    const entries = Object.entries(SHORTCUTS);
    const palette = ['#00ffd0','#ff4dd2','#ffd000','#00d0ff','#a0ff00','#ff8000'];
    entries.forEach(([k,v], i) => {
      ctx.fillStyle = palette[i % palette.length];
      ctx.fillRect(40, y-18, 120, 24);
      ctx.fillStyle = '#000';
      ctx.fillText(k, 50, y);
      ctx.fillStyle = '#eaeaea';
      ctx.fillText(v, 180, y);
      y += 32;
      if (y > 770) { y = 120; }
    });
    ctx.fillStyle = '#00ffd0'; ctx.font = '14px monospace';
    ctx.fillText('designed by Mario Garcia', 40, 790);
    c.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'hold-it-down-shortcuts.png';
      a.click(); setTimeout(()=>URL.revokeObjectURL(url), 1000);
    });
  };
  const palette = ['var(--neon)','var(--accent)','#ffd000','#00d0ff','#a0ff00','#ff8000'];
  return (
    <div>
      <button className="pill accent" onClick={downloadPNG} style={{marginBottom:10}}>⬇ DOWNLOAD PNG</button>
      <div className="shortcut-grid">
        {Object.entries(SHORTCUTS).map(([k,v], i) => (
          <div key={k} className="shortcut-item" style={{borderColor: palette[i%palette.length]}}>
            <span className="shortcut-key" style={{color: palette[i%palette.length]}}>{k}</span>
            <span>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ============================================================
   MAIN APP
   ============================================================ */
const App = () => {
  const [view, setView] = useState('home');

  // -- audio engine readiness
  const [audioReady, setAudioReady] = useState(false);

  // -- sound selection
  const [bankId, setBankId] = useState('ep');
  const [patchIdx, setPatchIdx] = useState(0);
  const [voiceMode, setVoiceMode] = useState('poly'); // poly/mono/legato

  // -- piano state
  const [keysHeight, setKeysHeight] = useState(160);
  const [startMidi, setStartMidi] = useState(48); // C3
  const [numKeys, setNumKeys] = useState(36);
  const [hideKeys, setHideKeys] = useState(false);
  const [scrollEnabled, setScrollEnabled] = useState(false);
  const [chromatic, setChromatic] = useState(false);
  const [octaveShift, setOctaveShift] = useState(0);
  const [transposeShift, setTransposeShift] = useState(0);
  const [activeMidis, setActiveMidis] = useState(new Set());
  const [litMidis, setLitMidis] = useState(new Set());
  const [buildMode, setBuildMode] = useState(false);
  const [buildShape, setBuildShape] = useState(new Set());
  const [sustain, setSustain] = useState(false);
  const [sustainHeld, setSustainHeld] = useState(new Set());

  // -- top bar
  const [topbarOpen, setTopbarOpen] = useState(true);
  const [masterVol, setMasterVol] = useState(0.7);

  // -- windows
  const [windows, setWindows] = useState({}); // {id: {open, x, y, w, h, z}}
  const [topZ, setTopZ] = useState(10);
  const openWindow = (id, defaults) => {
    setTopZ(z => z+1);
    setWindows(w => ({ ...w, [id]: { ...defaults, ...w[id], open: true, z: topZ+1, x: Math.max(8, Math.min(((w[id]&&w[id].x)||defaults.x), window.innerWidth-80)), y: Math.max(8, Math.min(((w[id]&&w[id].y)||defaults.y), window.innerHeight-80)) } }));
  };
  const closeWindow = (id) => setWindows(w => ({ ...w, [id]: { ...w[id], open: false } }));
  const focusWindow = (id) => setWindows(w => { setTopZ(z=>z+1); return { ...w, [id]: { ...w[id], z: topZ+1 } }; });
  const setWindow = (id, props) => setWindows(w => ({ ...w, [id]: { ...w[id], ...props } }));
  const toggleWindow = (id, defaults) => {
    if (windows[id] && windows[id].open) closeWindow(id);
    else openWindow(id, defaults);
  };

  // -- FX
  const [fx, setFx] = useState({
    eqLow:0, eqMid:0, eqHi:0,
    filterCut:18000, filterRes:0,
    drive:0, chorus:0, phaser:0, tremolo:0,
    delayTime:0.3, delayFb:0.25, delayWet:0.0,
    reverbWet:0.15
  });

  // -- sound design
  const [sd, setSd] = useState({
    attack:0.005, decay:0.3, sustain:0.7, release:0.5,
    cutoff:18000, resonance:0, drive:0,
    lfoRate:5, lfoAmt:0, glide:0
  });

  // -- chord bank
  const [rootFilter, setRootFilter] = useState('C');

  // -- pads / sampler
  const [pads, setPads] = useState(
    Array.from({length:8}).map((_,i)=>({ name:'Empty', enabled:true, type:'empty', data:null, chord:null, transpose:0 }))
  );
  const [currentPadIdx, setCurrentPadIdx] = useState(0);
  const [cycleEnabled, setCycleEnabled] = useState(false);
  const [cycleMode, setCycleMode] = useState('loop');
  const cycleDir = useRef(1);
  const [armed, setArmed] = useState(false);
  const [sustainHold, setSustainHold] = useState(true);
  const [playingPads, setPlayingPads] = useState(new Set());

  // -- mod wheel / pitch bend
  const [modValue, setModValue] = useState(0);
  const [pitchValue, setPitchValue] = useState(0);
  const [bendRange, setBendRange] = useState(2);
  const [glideMs, setGlideMs] = useState(0);
  const [modEffect, setModEffect] = useState('Shimmer Reverb');

  // -- 3D sound
  const [threedOn, setThreedOn] = useState(false);
  const [threedMode, setThreedMode] = useState('grid');
  const [threedPoints, setThreedPoints] = useState([
    { x:0.5, y:0.5, z:0.55, flavor:'Center Shimmer', mix:0.78, shimmer:0.75, space:0.85, delay:0.55, feedback:0.65, glitter:0.65, air:0.8, isCenter:true }
  ]);
  const [threedSelected, setThreedSelected] = useState(0);

  // -- theme
  const [theme, setTheme] = useState({
    bg:'#000000', neon:'#00ffd0', accent:'#ff4dd2', text:'#d8fff8',
    whiteKey:'#f4f9f6', blackKey:'#0a1413', bright:1, contrast:1
  });

  // -- play/stop transport
  const [playing, setPlaying] = useState(false);

  // ===== current patch object =====
  const currentPatch = useMemo(() => {
    const base = BANKS[bankId].patches[patchIdx];
    // apply sound design overrides
    return {
      ...base,
      amp: [sd.attack, sd.decay, sd.sustain, sd.release],
      filt: sd.cutoff,
      q: sd.resonance,
    };
  }, [bankId, patchIdx, sd]);

  // ===== Apply theme =====
  useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--bg', theme.bg);
    r.setProperty('--neon', theme.neon);
    r.setProperty('--neon-dim', theme.neon);
    r.setProperty('--accent', theme.accent);
    r.setProperty('--text', theme.text);
    r.setProperty('--white-key', theme.whiteKey);
    r.setProperty('--black-key', theme.blackKey);
    r.setProperty('--ui-bright', theme.bright);
    r.setProperty('--ui-contrast', theme.contrast);
  }, [theme]);

  // ===== Apply FX =====
  useEffect(() => {
    if (audioReady) AE.setFX(fx);
  }, [fx, audioReady]);

  // ===== Apply master volume =====
  useEffect(() => {
    if (audioReady) AE.setMaster(masterVol);
  }, [masterVol, audioReady]);

  // ===== Apply pitch bend / mod =====
  useEffect(() => {
    if (!audioReady) return;
    AE.applyDetune(pitchValue * bendRange * 100); // cents
    // Mod effect modulates FX layer
    if (modEffect === 'Shimmer Reverb') AE.setFX({ ...fx, reverbWet: Math.max(fx.reverbWet, modValue*0.8) });
    if (modEffect === 'Tape Wow') AE.setFX({ ...fx, tremolo: Math.max(fx.tremolo, modValue*0.6) });
    if (modEffect === 'Filter Sweep') AE.setFX({ ...fx, filterCut: 600 + (1-modValue)*16000 });
    if (modEffect === 'Detune Choir') AE.setFX({ ...fx, chorus: Math.max(fx.chorus, modValue) });
    if (modEffect === 'Bit Crush') AE.setFX({ ...fx, drive: Math.max(fx.drive, modValue*0.8) });
    if (modEffect === 'Tremolo Cosmic') AE.setFX({ ...fx, tremolo: Math.max(fx.tremolo, modValue), phaser: Math.max(fx.phaser, modValue) });
    if (modEffect === 'Chorus Wide') AE.setFX({ ...fx, chorus: Math.max(fx.chorus, modValue*0.9) });
    if (modEffect === 'Auto Wah') AE.setFX({ ...fx, filterCut: 400 + modValue*4000, filterRes: 4 + modValue*8 });
  }, [pitchValue, bendRange, modValue, modEffect, audioReady]);

  // ===== Apply 3D state =====
  useEffect(() => {
    if (!audioReady) return;
    AE.set3D(threedOn, threedPoints, threedSelected);
  }, [threedOn, threedPoints, threedSelected, audioReady]);

  // ===== Note handlers =====
  const noteOnRaw = useCallback((midi) => {
    if (!audioReady) return;
    const m = midi + octaveShift*12 + transposeShift;
    if (buildMode) {
      setBuildShape(s => { const ns = new Set(s); ns.has(m) ? ns.delete(m) : ns.add(m); return ns; });
      return;
    }
    if (voiceMode !== 'poly') {
      // mono / legato — kill others
      Object.keys(AE.voices).forEach(k => AE.noteOff(+k));
    }
    AE.noteOn(m, currentPatch);
    setActiveMidis(s => { const ns = new Set(s); ns.add(m); return ns; });
    // armed recording? we don't actually record samples here, but we add the note to current pad
    if (armed && pads[currentPadIdx]) {
      const np = pads.slice();
      np[currentPadIdx] = { ...np[currentPadIdx], type:'note', data: m, chord:null, name: midiToName(m), transpose: np[currentPadIdx]?.transpose || 0 };
      setPads(np);
    }
  }, [audioReady, octaveShift, transposeShift, voiceMode, currentPatch, buildMode, armed, pads, currentPadIdx]);

  const noteOffRaw = useCallback((midi) => {
    if (!audioReady) return;
    const m = midi + octaveShift*12 + transposeShift;
    if (buildMode) return;
    if (sustain || sustainHeld.has(m)) {
      setSustainHeld(s => { const ns = new Set(s); ns.add(m); return ns; });
      return;
    }
    AE.noteOff(m);
    setActiveMidis(s => { const ns = new Set(s); ns.delete(m); return ns; });
  }, [audioReady, octaveShift, transposeShift, buildMode, sustain, sustainHeld]);

  // sustain release
  useEffect(() => {
    if (!sustain) {
      sustainHeld.forEach(m => {
        AE.noteOff(m);
        setActiveMidis(s => { const ns = new Set(s); ns.delete(m); return ns; });
      });
      setSustainHeld(new Set());
    }
  }, [sustain]);

  // ===== Chord bank: light up notes =====
  const onSelectChord = useCallback((root, q) => {
    const formula = CHORD_FORMULAS[q];
    const rootMidi = 60 + ROOT_TO_PC[root];
    const midis = formula.map(i => rootMidi + i);
    setLitMidis(new Set(midis));
    // play preview
    midis.forEach(m => {
      AE.noteOn(m, currentPatch);
      setTimeout(()=>AE.noteOff(m), 800);
    });
    if (buildMode) {
      setBuildShape(s => { const ns = new Set(s); midis.forEach(m=>ns.add(m)); return ns; });
    }
  }, [currentPatch, buildMode]);

  // ===== Transpose: shift lit keys =====
  const transposeUp = () => {
    setTransposeShift(t => t+1);
    setLitMidis(s => new Set([...s].map(m => m+1)));
    setBuildShape(s => new Set([...s].map(m => m+1)));
  };
  const transposeDown = () => {
    setTransposeShift(t => t-1);
    setLitMidis(s => new Set([...s].map(m => m-1)));
    setBuildShape(s => new Set([...s].map(m => m-1)));
  };

  // ===== Build mode: play shape =====
  const playBuildShape = () => {
    if (buildShape.size === 0) return;
    buildShape.forEach(m => {
      AE.noteOn(m, currentPatch);
      setTimeout(()=>AE.noteOff(m), 1500);
    });
  };
  const stopAll = () => {
    AE.allNotesOff();
    setActiveMidis(new Set());
    setSustainHeld(new Set());
  };
  const clearShape = () => { setBuildShape(new Set()); setLitMidis(new Set()); };

  // ===== Pad triggers + smooth wireless keyboard sequencing =====
  const padNodeRefs = useRef({});
  const padReleaseMs = 140;
  const padOverlapMs = 55;

  const stopPadSmooth = useCallback((i, fadeSeconds=0.14) => {
    const ref = padNodeRefs.current[i];
    if (!ref) return;
    if (ref.type === 'audio') {
      try {
        ref.gain.gain.cancelScheduledValues(Tone.now());
        ref.gain.gain.rampTo(0, fadeSeconds);
        setTimeout(() => {
          try { ref.player.stop(); ref.player.dispose(); ref.gain.dispose(); } catch(e){}
        }, Math.max(40, fadeSeconds*1000 + 30));
      } catch(e){}
    } else if (Array.isArray(ref.notes)) {
      setTimeout(() => {
        ref.notes.forEach(m => AE.noteOff(m));
      }, Math.max(20, fadeSeconds*650));
    }
    delete padNodeRefs.current[i];
    setPlayingPads(s => { const ns = new Set(s); ns.delete(i); return ns; });
  }, []);

  const startPadSmooth = useCallback((i) => {
    const pad = pads[i];
    if (!pad || !pad.enabled) return false;
    const tr = pad.transpose || 0;
    setPlayingPads(s => { const ns = new Set(s); ns.add(i); return ns; });
    if (pad.type === 'audio' && pad.data) {
      stopPadSmooth(i, 0.05);
      const gain = new Tone.Gain(0).connect(AE.voicesInput());
      const player = new Tone.Player(pad.data).connect(gain);
      player.playbackRate = Math.pow(2, tr/12);
      player.start(Tone.now() + 0.005);
      gain.gain.rampTo(1, 0.11);
      padNodeRefs.current[i] = { type:'audio', player, gain };
      return true;
    }
    if (pad.type === 'note' && typeof pad.data === 'number') {
      const note = pad.data + tr;
      AE.noteOn(note, currentPatch);
      padNodeRefs.current[i] = { type:'note', notes:[note] };
      return true;
    }
    if (pad.type === 'chord' && Array.isArray(pad.chord)) {
      const notes = pad.chord.map(m => m + tr);
      notes.forEach(m => AE.noteOn(m, currentPatch));
      padNodeRefs.current[i] = { type:'chord', notes };
      return true;
    }
    setPlayingPads(s => { const ns = new Set(s); ns.delete(i); return ns; });
    return false;
  }, [pads, currentPatch, stopPadSmooth]);

  const getSequencedPadIndex = useCallback((direction=1) => {
    if (!pads.length) return 0;
    const usable = pads.map((p,i)=>({p,i})).filter(({p}) => p && p.enabled && p.type !== 'empty');
    const pool = usable.length ? usable.map(x=>x.i) : pads.map((_,i)=>i);
    const currentPos = Math.max(0, pool.indexOf(currentPadIdx));
    if (cycleMode === 'pingpong') {
      const dir = direction || cycleDir.current || 1;
      let nextPos = currentPos + dir;
      if (nextPos >= pool.length) { nextPos = Math.max(0, pool.length-2); cycleDir.current = -1; }
      else if (nextPos < 0) { nextPos = Math.min(pool.length-1, 1); cycleDir.current = 1; }
      else { cycleDir.current = dir; }
      return pool[nextPos] ?? currentPadIdx;
    }
    const nextPos = (currentPos + direction + pool.length) % pool.length;
    return pool[nextPos] ?? currentPadIdx;
  }, [pads, currentPadIdx, cycleMode]);

  const transitionToPad = useCallback((nextIdx) => {
    if (nextIdx == null || nextIdx < 0 || nextIdx >= pads.length) return;
    const previous = Object.keys(padNodeRefs.current).map(Number).filter(i => i !== nextIdx);
    setCurrentPadIdx(nextIdx);
    const started = startPadSmooth(nextIdx);
    if (started) {
      setTimeout(() => previous.forEach(i => stopPadSmooth(i, padReleaseMs/1000)), padOverlapMs);
    }
  }, [pads.length, startPadSmooth, stopPadSmooth]);

  const sequencePad = useCallback((direction=1) => {
    const nextIdx = getSequencedPadIndex(direction);
    transitionToPad(nextIdx);
  }, [getSequencedPadIndex, transitionToPad]);

  const triggerPad = useCallback((i, on) => {
    const pad = pads[i];
    if (!pad || !pad.enabled) return;
    if (on) {
      startPadSmooth(i);
      if (cycleEnabled) {
        const ni = getSequencedPadIndex(1);
        setCurrentPadIdx(ni);
      }
    } else if (!sustainHold) {
      stopPadSmooth(i, padReleaseMs/1000);
    }
  }, [pads, cycleEnabled, sustainHold, startPadSmooth, stopPadSmooth, getSequencedPadIndex]);

  // ===== Load chord into pad =====
  const loadChordToPad = useCallback((idx) => {
    const chord = [...buildShape];
    if (!chord.length) {
      // fall back to lit
      [...litMidis].forEach(m => chord.push(m));
    }
    if (!chord.length) return;
    const np = pads.slice();
    if (idx >= np.length) {
      np.push({ name: 'Chord '+(chord.length), enabled:true, type:'chord', data:null, chord, transpose:0 });
    } else {
      np[idx] = { ...np[idx], type:'chord', data:null, chord, name:'Chord '+(chord.length), transpose: np[idx]?.transpose || 0 };
    }
    setPads(np);
  }, [buildShape, litMidis, pads]);

  // ===== 3D dice randomize =====
  const dice3D = () => {
    const flavors = ['Shimmer','Aurora','Cosmic','Halo','Glitter','Sub Sky','Dream Echo','Vapor','Crystal','Phantom','Air Bell','Tape Choir'];
    const preset = {
      Shimmer:{shimmer:.92,space:.82,delay:.45,feedback:.62,glitter:.82,air:.88,mix:.78,z:.55}, Aurora:{shimmer:.72,space:.95,delay:.62,feedback:.72,glitter:.48,air:.76,mix:.72,z:.75}, Cosmic:{shimmer:.84,space:.9,delay:.78,feedback:.8,glitter:.68,air:.72,mix:.8,z:.82}, Halo:{shimmer:.55,space:.86,delay:.34,feedback:.45,glitter:.38,air:.92,mix:.62,z:.5}, Glitter:{shimmer:.88,space:.62,delay:.28,feedback:.52,glitter:.96,air:.95,mix:.7,z:.42}, 'Sub Sky':{shimmer:.25,space:.88,delay:.7,feedback:.76,glitter:.24,air:.42,mix:.74,z:.9}, 'Dream Echo':{shimmer:.68,space:.82,delay:.86,feedback:.82,glitter:.52,air:.7,mix:.76,z:.68}, Vapor:{shimmer:.58,space:.98,delay:.55,feedback:.64,glitter:.58,air:.86,mix:.68,z:.7}, Crystal:{shimmer:.95,space:.72,delay:.38,feedback:.58,glitter:.9,air:.98,mix:.72,z:.48}, Phantom:{shimmer:.46,space:.94,delay:.74,feedback:.74,glitter:.36,air:.62,mix:.66,z:.86}, 'Air Bell':{shimmer:.98,space:.7,delay:.3,feedback:.5,glitter:.86,air:1,mix:.68,z:.38}, 'Tape Choir':{shimmer:.52,space:.78,delay:.66,feedback:.7,glitter:.3,air:.58,mix:.64,z:.62}
    };
    const n = 3 + Math.floor(Math.random()*4);
    const pts = Array.from({length:n}).map((_,i)=>{
      const flavor = flavors[Math.floor(Math.random()*flavors.length)];
      return { x:0.1+Math.random()*0.8, y:0.1+Math.random()*0.8, flavor, isCenter:i===0, ...preset[flavor] };
    });
    setThreedPoints(pts);
    setThreedSelected(0);
  };

  // ===== Save / Open project =====
  const saveProject = () => {
    const data = {
      version: 1,
      bankId, patchIdx, voiceMode,
      keysHeight, startMidi, numKeys, hideKeys, scrollEnabled, chromatic,
      octaveShift, transposeShift,
      masterVol, fx, sd,
      pads: pads.map(p => ({ ...p, data: p.type==='audio' ? null : p.data })), // can't serialize audio buffers
      bendRange, glideMs, modEffect, modValue,
      threedOn, threedMode, threedPoints,
      theme,
      buildShape: [...buildShape],
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'hold-it-down-project.hid.json';
    a.click(); setTimeout(()=>URL.revokeObjectURL(url), 1000);
  };
  const openProject = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json,.hid,application/json';
    inp.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = (ev) => {
        try {
          const d = JSON.parse(ev.target.result);
          d.bankId && setBankId(d.bankId);
          typeof d.patchIdx === 'number' && setPatchIdx(d.patchIdx);
          d.voiceMode && setVoiceMode(d.voiceMode);
          typeof d.keysHeight === 'number' && setKeysHeight(d.keysHeight);
          typeof d.startMidi === 'number' && setStartMidi(d.startMidi);
          typeof d.numKeys === 'number' && setNumKeys(d.numKeys);
          typeof d.hideKeys === 'boolean' && setHideKeys(d.hideKeys);
          typeof d.scrollEnabled === 'boolean' && setScrollEnabled(d.scrollEnabled);
          typeof d.chromatic === 'boolean' && setChromatic(d.chromatic);
          typeof d.octaveShift === 'number' && setOctaveShift(d.octaveShift);
          typeof d.transposeShift === 'number' && setTransposeShift(d.transposeShift);
          typeof d.masterVol === 'number' && setMasterVol(d.masterVol);
          d.fx && setFx(d.fx);
          d.sd && setSd(d.sd);
          Array.isArray(d.pads) && setPads(d.pads);
          typeof d.bendRange === 'number' && setBendRange(d.bendRange);
          typeof d.glideMs === 'number' && setGlideMs(d.glideMs);
          d.modEffect && setModEffect(d.modEffect);
          typeof d.modValue === 'number' && setModValue(d.modValue);
          typeof d.threedOn === 'boolean' && setThreedOn(d.threedOn);
          d.threedMode && setThreedMode(d.threedMode);
          Array.isArray(d.threedPoints) && setThreedPoints(d.threedPoints);
          d.theme && setTheme(d.theme);
          Array.isArray(d.buildShape) && setBuildShape(new Set(d.buildShape));
        } catch(err) { alert('Failed to load: '+ err.message); }
      };
      r.readAsText(file);
    };
    inp.click();
  };

  // ===== Keyboard shortcuts =====
  useEffect(() => {
    const down = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key.toLowerCase();
      if ((e.metaKey || e.ctrlKey) && k === 's') { e.preventDefault(); saveProject(); return; }
      if ((e.metaKey || e.ctrlKey) && k === 'o') { e.preventDefault(); openProject(); return; }
      if ((e.metaKey || e.ctrlKey) && k === 'k') { e.preventDefault(); AE.killAll(); setActiveMidis(new Set()); setSustainHeld(new Set()); return; }
      if (e.shiftKey && k === 'shift') return;
      if (k === 'shift') return;
      if (e.key === 'Shift') { setSustain(true); return; }
      if (k in KEY_MAP_NOTES && !e.repeat) { noteOnRaw(KEY_MAP_NOTES[k]); return; }
      if (k === 'z') { setOctaveShift(o => o-1); return; }
      if (k === 'x') { setOctaveShift(o => o+1); return; }
      if (k === ',') { transposeDown(); return; }
      if (k === '.') { transposeUp(); return; }
      if (e.key === 'ArrowUp')   { setPitchValue(1); return; }
      if (e.key === 'ArrowDown') { setPitchValue(-1); return; }
      if ((e.key === 'ArrowLeft' || k === '[') && !e.repeat) { e.preventDefault(); sequencePad(-1); return; }
      if ((e.key === 'ArrowRight' || k === ']') && !e.repeat) { e.preventDefault(); sequencePad(1); return; }
      if (e.key === 'Enter' && !e.repeat) { e.preventDefault(); transitionToPad(currentPadIdx); return; }
      if (k === ' ') { e.preventDefault(); setPlaying(p=>!p); if (!playing) playBuildShape(); else stopAll(); return; }
      if (k === 'b') { setBuildMode(b=>!b); return; }
      if (k === 'c') { clearShape(); return; }
      if (k === 'm') { setModValue(v => Math.min(1, v+0.1)); return; }
      if (k === 'n') { setModValue(v => Math.max(0, v-0.1)); return; }
      if (k === 'h') { setHideKeys(h=>!h); return; }
      // pad triggers 1-5 row, q-t row
      const padKeys = ['1','2','3','4','5','q','w','e','r','t'];
      const pi = padKeys.indexOf(e.key);
      if (pi >= 0 && pi < pads.length && !e.repeat) { triggerPad(pi, true); }
    };
    const up = (e) => {
      const k = e.key.toLowerCase();
      if (e.key === 'Shift') { setSustain(false); return; }
      if (k in KEY_MAP_NOTES) { noteOffRaw(KEY_MAP_NOTES[k]); return; }
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') { setPitchValue(0); return; }
      const padKeys = ['1','2','3','4','5','q','w','e','r','t'];
      const pi = padKeys.indexOf(e.key);
      if (pi >= 0 && pi < pads.length) { triggerPad(pi, false); }
    };
    window.addEventListener('keydown', down);
    window.addEventListener('keyup', up);
    return () => { window.removeEventListener('keydown', down); window.removeEventListener('keyup', up); };
  }, [noteOnRaw, noteOffRaw, transposeUp, transposeDown, playing, pads, triggerPad, sequencePad, transitionToPad, currentPadIdx]);

  // ===== Topbar resize =====
  const [topbarHeight, setTopbarHeight] = useState(104);
  const onTopbarResize = (e) => {
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const startY = t.clientY, oh = topbarHeight;
    const move = (ev) => {
      ev.preventDefault && ev.preventDefault();
      const m = ev.touches ? ev.touches[0] : ev;
      const next = Math.max(0, Math.min(220, oh + (m.clientY - startY)));
      setTopbarHeight(next);
      setTopbarOpen(next > 18);
    };
    const up = () => {
      window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
    };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
  };

  // ===== Enter app =====
  const enter = async () => {
    await Tone.start();
    AE.init();
    setAudioReady(true);
    setView('app');
  };

  /* ===========================
     RENDER
     =========================== */
  if (view === 'home') return <Homepage onEnter={enter} />;

  const ws = (id) => windows[id] || { open:false, x:60, y:60, w:340, h:300, z:10 };
  const renderWindow = (id, title, content, defaults) => {
    const s = ws(id);
    if (!s.open) return null;
    return (
      <DraggableWindow
        title={title}
        x={s.x} y={s.y} w={s.w} h={s.h} z={s.z}
        onMove={(x,y) => setWindow(id, { x, y })}
        onResize={(w,h) => setWindow(id, { w, h })}
        onClose={() => closeWindow(id)}
        onFocus={() => focusWindow(id)}
      >
        {content}
      </DraggableWindow>
    );
  };

  return (
    <div className="app">
      {/* ============= TOPBAR ============= */}
      <div className="topbar" style={{maxHeight: topbarOpen ? topbarHeight : 0, padding: topbarOpen ? '6px 10px' : '0 10px'}}>
        <div className="top-group">
          <span className="top-label">VOL</span>
          <input type="range" min="0" max="1" step="0.01" value={masterVol} onChange={e=>setMasterVol(+e.target.value)} className="vol-slider" />
          <span className="small">{(masterVol*100|0)}</span>
        </div>
        <div className="top-group">
          <button className="top-btn danger" onClick={()=>{ AE.killAll(); setActiveMidis(new Set()); setSustainHeld(new Set()); }}>⏻ KILL</button>
          <button className={'top-btn'+(sustain?' active':'')} onClick={()=>setSustain(!sustain)}>SUSTAIN</button>
        </div>
        <div className="top-group">
          <button className="top-btn" onClick={()=>{ setPlaying(true); playBuildShape(); }}>▶ PLAY</button>
          <button className="top-btn" onClick={()=>{ setPlaying(false); stopAll(); }}>■ STOP</button>
          <button className={'top-btn'+(buildMode?' active':'')} onClick={()=>setBuildMode(!buildMode)}>BUILD</button>
          <button className="top-btn" onClick={clearShape}>CLEAR</button>
        </div>
        <div className="top-group">
          <button className={'top-btn'+(chromatic?' active':'')} onClick={()=>setChromatic(!chromatic)}>CHROMATIC</button>
          <button className="top-btn" onClick={()=>setOctaveShift(o=>o-1)}>OCT −</button>
          <span className="small">{octaveShift>0?'+':''}{octaveShift}</span>
          <button className="top-btn" onClick={()=>setOctaveShift(o=>o+1)}>OCT +</button>
          <button className="top-btn" onClick={transposeDown}>TR −</button>
          <span className="small">{transposeShift>0?'+':''}{transposeShift}</span>
          <button className="top-btn" onClick={transposeUp}>TR +</button>
        </div>
        <div className="top-group">
          <button className={'top-btn'+(hideKeys?' active':'')} onClick={()=>setHideKeys(!hideKeys)}>HIDE KEYS</button>
          <button className={'top-btn'+(scrollEnabled?' active':'')} onClick={()=>setScrollEnabled(!scrollEnabled)}>SLIDE</button>
        </div>
        <div className="top-group">
          <button className="top-btn" onClick={()=>toggleWindow('color', {x:80,y:80,w:320,h:380})}>◆ COLOR</button>
          <button className="top-btn" onClick={saveProject}>💾 SAVE</button>
          <button className="top-btn" onClick={openProject}>📂 OPEN</button>
          <button className="top-btn" onClick={()=>toggleWindow('shortcuts', {x:100,y:100,w:520,h:420})}>⌨ KEYS</button>
        </div>
        <div className="topbar-handle" onMouseDown={onTopbarResize} onTouchStart={onTopbarResize}></div>
      </div>
      <div style={{height:6, cursor:'ns-resize', background:'transparent', position:'relative'}} onMouseDown={onTopbarResize} onTouchStart={onTopbarResize}>
        <div style={{position:'absolute', left:'50%', transform:'translateX(-50%)', width:40, height:3, background:'var(--neon-dim)', top:1}}></div>
      </div>

      {/* ============= WORKSPACE ============= */}
      <div className="workspace">
        {renderWindow('banks', 'BANKS',
          <BanksWindow bankId={bankId} setBankId={setBankId} patchIdx={patchIdx} setPatchIdx={setPatchIdx} voiceMode={voiceMode} setVoiceMode={setVoiceMode} />,
          {x:20,y:20,w:340,h:380})}
        {renderWindow('fx', 'FX RACK',
          <FXRack fx={fx} setFx={setFx} />,
          {x:380,y:20,w:340,h:480})}
        {renderWindow('sd', 'SOUND DESIGN',
          <SoundDesign sd={sd} setSd={setSd} />,
          {x:740,y:20,w:340,h:380})}
        {renderWindow('chord', 'CHORD BANK',
          <ChordBankWindow onSelectChord={onSelectChord} rootFilter={rootFilter} setRootFilter={setRootFilter} />,
          {x:20,y:420,w:420,h:340})}
        {renderWindow('pads', 'PADS / SAMPLER',
          <PadsSamplerWindow
            pads={pads} setPads={setPads}
            currentPadIdx={currentPadIdx} setCurrentPadIdx={setCurrentPadIdx}
            cycleEnabled={cycleEnabled} setCycleEnabled={setCycleEnabled}
            cycleMode={cycleMode} setCycleMode={setCycleMode}
            armed={armed} setArmed={setArmed}
            sustainHold={sustainHold} setSustainHold={setSustainHold}
            onTriggerPad={triggerPad}
            onLoadChord={loadChordToPad}
            buildMode={buildMode} setBuildMode={setBuildMode}
            playingPads={playingPads}
          />,
          {x:460,y:420,w:480,h:400})}
        {renderWindow('mod', 'MOD / PITCH',
          <ModWheelWindow
            modValue={modValue} setModValue={setModValue}
            pitchValue={pitchValue} setPitchValue={setPitchValue}
            bendRange={bendRange} setBendRange={setBendRange}
            glideMs={glideMs} setGlideMs={setGlideMs}
            modEffect={modEffect} setModEffect={setModEffect}
          />,
          {x:980,y:20,w:420,h:380})}
        {renderWindow('3d', '✦ 3D SOUND',
          <ThreeDSoundWindow
            enabled={threedOn} setEnabled={setThreedOn}
            mode={threedMode} setMode={setThreedMode}
            points={threedPoints} setPoints={setThreedPoints}
            selectedPoint={threedSelected} setSelectedPoint={setThreedSelected}
            onDice={dice3D}
          />,
          {x:520,y:60,w:440,h:480})}
        {renderWindow('color', 'COLOR',
          <ColorCustomize theme={theme} setTheme={setTheme} />,
          {x:80,y:80,w:320,h:400})}
        {renderWindow('shortcuts', 'KEYBOARD SHORTCUTS',
          <ShortcutsWindow />,
          {x:120,y:80,w:560,h:440})}
      </div>

      {/* ============= FEATURE BAR ============= */}
      <div className="feature-bar">
        <button className={'feature-btn'+(ws('banks').open?' open':'')} onClick={()=>toggleWindow('banks', {x:20,y:20,w:340,h:380})}>BANKS</button>
        <button className={'feature-btn'+(ws('fx').open?' open':'')} onClick={()=>toggleWindow('fx', {x:380,y:20,w:340,h:480})}>FX RACK</button>
        <button className={'feature-btn'+(ws('sd').open?' open':'')} onClick={()=>toggleWindow('sd', {x:740,y:20,w:340,h:380})}>SOUND DESIGN</button>
        <button className={'feature-btn'+(ws('chord').open?' open':'')} onClick={()=>toggleWindow('chord', {x:20,y:420,w:420,h:340})}>CHORD BANK</button>
        <button className={'feature-btn'+(ws('pads').open?' open':'')} onClick={()=>toggleWindow('pads', {x:460,y:420,w:480,h:400})}>PADS / SAMPLER</button>
        <button className={'feature-btn'+(ws('mod').open?' open':'')} onClick={()=>toggleWindow('mod', {x:980,y:20,w:420,h:380})}>MOD WHEEL</button>
        <button className={'feature-btn special'+(ws('3d').open?' open':'')} onClick={()=>toggleWindow('3d', {x:520,y:60,w:440,h:480})}>✦ 3D SOUND</button>
        <div style={{flex:1}}></div>
        <span className="small" style={{color:'var(--neon-dim)'}}>{BANKS[bankId].label} / {BANKS[bankId].patches[patchIdx].name}</span>
      </div>

      {/* ============= KEYBOARD ============= */}
      {!hideKeys && (
        <div className="keyboard-wrap">
          <div className="keyboard-control">
            <span className="small" style={{color:'var(--neon-dim)'}}>SIZE</span>
            <input type="range" min="0" max="280" step="2" value={keysHeight}
              onChange={e=>setKeysHeight(+e.target.value)} className="size-slider"/>
            <span className="small">RANGE</span>
            <input type="range" min="13" max="61" step="1" value={numKeys} onChange={e=>setNumKeys(+e.target.value)} style={{width:80}}/>
            <span className="small" style={{color:'var(--neon)'}}>{midiToName(startMidi)} – {midiToName(startMidi+numKeys-1)}</span>
          </div>
          {keysHeight > 16 && (
            <PianoKeys
              height={keysHeight}
              startMidi={startMidi}
              numKeys={numKeys}
              activeMidis={activeMidis}
              litMidis={litMidis}
              buildLitMidis={buildShape}
              chromatic={chromatic}
              onNoteOn={noteOnRaw}
              onNoteOff={noteOffRaw}
              scrollEnabled={scrollEnabled}
              onScroll={(steps) => setStartMidi(s => Math.max(12, Math.min(108-numKeys, s+steps)))}
            />
          )}
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
