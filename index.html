<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Hold It Down — designed by Mario Garcia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #000000;
    --neon: #00ffd0;
    --neon-dim: #00b89a;
    --accent: #ff4dd2;
    --text: #d8fff8;
    --white-key: #f4f9f6;
    --black-key: #0a1413;
    --ui-bright: 1;
    --ui-contrast: 1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; filter: brightness(var(--ui-bright)) contrast(var(--ui-contrast)); }
  body { user-select: none; -webkit-user-select: none; touch-action: none; }
  button { background: transparent; color: inherit; font-family: inherit; cursor: pointer; border: none; }
  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; }
  input[type="range"]::-webkit-slider-runnable-track { height: 3px; background: var(--neon-dim); }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 8px var(--neon); margin-top: -6px; cursor: pointer; }
  input[type="range"]::-moz-range-track { height: 3px; background: var(--neon-dim); }
  input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 8px var(--neon); border: none; cursor: pointer; }

  /* ============================== HOMEPAGE ============================== */
  .home { position: fixed; inset: 0; background: #000; overflow: hidden; }
  .home-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,208,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,208,0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    transform: perspective(500px) rotateX(60deg) translateY(80px);
    transform-origin: bottom center;
    mask-image: linear-gradient(to top, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
    animation: gridMove 8s linear infinite;
  }
  @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 50px; } }
  .home-title {
    position: absolute; top: 4vh; left: 50%; transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.25rem, 3.7vw, 3rem);
    color: #92fff0;
    letter-spacing: 0.1em;
    text-align: center;
    z-index: 5;
    filter: none;
    text-shadow:
      1px 1px 0 #008b78,
      2px 2px 0 #006f62,
      3px 3px 0 #004f48,
      0 0 6px rgba(0,255,208,0.72),
      0 0 14px rgba(0,184,154,0.45);
  }
  .home-title span {
    display:inline-block; margin:0 0.01em; position:relative;
    background:
      linear-gradient(135deg,#bffff7 0%,#41ffe1 30%,#00bfa5 60%,#006a60 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .home-title span::after {
    content:""; position:absolute; inset:-0.12em;
    background-image:
      linear-gradient(rgba(180,255,245,.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,255,245,.18) 1px, transparent 1px);
    background-size:.34em .34em; opacity:.8; mix-blend-mode:screen; pointer-events:none;
  }
  .home-subtitle {
    position: absolute; top: calc(4vh + clamp(1.6rem,4.5vw,3.8rem)); left: 50%; transform: translateX(-50%);
    font-family: 'VT323', monospace; font-size: clamp(0.8rem, 1.6vw, 1.2rem);
    color: var(--neon-dim); letter-spacing: 0.4em; z-index: 5;
  }
  .home-credit {
    position: absolute; bottom: 1.2vh; left: 50%; transform: translateX(-50%);
    font-family: 'VT323', monospace; font-size: 12px; color: var(--neon-dim);
    letter-spacing: 0.2em; opacity: 0.7; z-index: 5;
  }
  .home-piano {
    position: absolute; top: 50%; left: 50%;
    transform-style: preserve-3d;
    transform: translate(-50%, -55%) perspective(800px) rotateX(45deg) rotateZ(-2deg);
    width: min(70vw, 700px); height: min(20vh, 180px);
    z-index: 3;
    animation: pianoFloat 6s ease-in-out infinite;
  }
  @keyframes pianoFloat {
    0%, 100% { transform: translate(-50%, -55%) perspective(800px) rotateX(45deg) rotateZ(-2deg) translateY(0); }
    50% { transform: translate(-50%, -55%) perspective(800px) rotateX(45deg) rotateZ(-2deg) translateY(-12px); }
  }
  .home-piano .key {
    position: absolute; bottom: 0; background: linear-gradient(to bottom, #001a16, #002420);
    border: 1px solid var(--neon); box-shadow: inset 0 -8px 12px rgba(0,255,208,0.15), 0 0 8px rgba(0,255,208,0.3);
    transform-style: preserve-3d;
  }
  .home-piano .key.white { width: 6.66%; height: 100%; }
  .home-piano .key.black { width: 4%; height: 60%; background: #000; border: 1px solid var(--neon); box-shadow: 0 0 10px var(--neon-dim); z-index: 2; }
  .home-piano .key-glow {
    position: absolute; left: 0; right: 0; bottom: 0; height: 30%;
    background: linear-gradient(to top, var(--neon), transparent);
    opacity: 0.35; pointer-events: none;
  }

  .home-pads {
    position: absolute; top: 50%; right: 4vw; transform: translateY(-50%);
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    z-index: 2;
  }
  .home-pad {
    width: 60px; height: 60px; border: 2px solid var(--neon-dim);
    background: #050a09; box-shadow: 0 0 8px rgba(0,255,208,0.25) inset;
    border-radius: 4px; transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }
  .home-pad.lit { background: rgba(0,255,208,0.5); box-shadow: 0 0 20px var(--neon), inset 0 0 12px var(--neon); transform: translateZ(-8px) scale(0.94); border-color: var(--neon); }

  .home-knobs {
    position: absolute; bottom: 6vh; left: 3vw;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    width: min(36vw, 320px);
    z-index: 2;
  }
  .home-knob {
    width: 60px; height: 60px; border: 2px solid var(--neon); border-radius: 50%;
    position: relative; background: radial-gradient(circle, #001f1b, #000);
    box-shadow: 0 0 10px var(--neon-dim);
  }
  .home-knob::after { content: ""; position: absolute; top: 6px; left: 50%; width: 2px; height: 20px; background: var(--neon); transform-origin: center 24px; transform: translateX(-50%); box-shadow: 0 0 6px var(--neon); }
  .home-slider { width: 4px; height: 50px; background: var(--neon-dim); border-radius: 2px; position: relative; }
  .home-slider::after { content: ""; position: absolute; left: -8px; width: 20px; height: 8px; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
  .home-viz {
    position: absolute; bottom: 6vh; right: 3vw;
    width: min(30vw, 280px); height: 90px;
    border: 2px solid var(--neon); box-shadow: 0 0 18px rgba(0,255,208,0.3), inset 0 0 16px rgba(0,255,208,0.15);
    background: #000;
    z-index: 2;
  }
  .home-viz canvas { width: 100%; height: 100%; display: block; }
  .home-symbol {
    position: absolute; font-family: 'Share Tech Mono', monospace; color: var(--neon);
    text-shadow: 0 0 8px var(--neon); pointer-events: none; opacity: 0.7;
    font-size: 18px; z-index: 1;
    animation: floatSym 14s linear infinite;
  }
  @keyframes floatSym {
    0% { transform: translate(0,0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.7; }
    100% { transform: translate(var(--dx,30px), var(--dy,-60px)) rotate(360deg); opacity: 0; }
  }
  .home-enter {
    position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
    padding: 14px 32px; border: 2px solid var(--neon); color: var(--neon);
    font-family: 'Press Start 2P', monospace; font-size: 12px; letter-spacing: 0.2em;
    box-shadow: 0 0 16px var(--neon), inset 0 0 16px rgba(0,255,208,0.2);
    background: rgba(0,0,0,0.6); z-index: 10;
    transition: all 0.2s ease;
  }
  .home-enter:hover, .home-enter:active { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }

  /* ============================== APP SHELL ============================== */
  .app { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    background: #000; border-bottom: 1px solid var(--neon-dim);
    box-shadow: 0 0 12px rgba(0,255,208,0.2);
    display: flex; align-items: center; flex-wrap: wrap;
    padding: 6px 10px; gap: 6px;
    transition: max-height 0.3s ease;
    overflow: hidden; flex-shrink: 0;
    font-size: 11px; font-family: 'Share Tech Mono', monospace;
  }
  .topbar-handle {
    position: absolute; left: 0; right: 0; bottom: -6px; height: 6px;
    cursor: ns-resize; z-index: 100;
  }
  .top-btn {
    padding: 5px 10px; border: 1px solid var(--neon-dim); color: var(--neon);
    background: #000; font-size: 10px; letter-spacing: 0.05em; font-family: 'Share Tech Mono', monospace;
    transition: all 0.12s ease; white-space: nowrap;
  }
  .top-btn:hover, .top-btn:active { box-shadow: 0 0 8px var(--neon); border-color: var(--neon); }
  .top-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
  .top-btn.danger { color: var(--accent); border-color: var(--accent); }
  .top-btn.danger:hover, .top-btn.danger:active { box-shadow: 0 0 8px var(--accent); }
  .top-group {
    display: flex; align-items: center; gap: 4px;
    padding: 0 6px; border-right: 1px dashed rgba(0,255,208,0.25);
  }
  .top-group:last-child { border-right: none; }
  .vol-slider { width: 90px; }
  .top-label { color: var(--neon-dim); font-size: 9px; letter-spacing: 0.1em; }

  /* ============================== WORKSPACE ============================== */
  .workspace { flex: 1; position: relative; overflow: hidden; }
  .feature-bar {
    background: #000; border-top: 1px solid var(--neon-dim);
    display: flex; align-items: center; padding: 6px 10px; gap: 6px;
    flex-wrap: wrap; flex-shrink: 0;
  }
  .feature-btn {
    padding: 7px 14px; border: 1px solid var(--neon); color: var(--neon); background: #000;
    font-size: 11px; letter-spacing: 0.06em;
    transition: all 0.15s ease; font-family: 'Share Tech Mono', monospace;
  }
  .feature-btn:hover, .feature-btn:active { box-shadow: 0 0 12px var(--neon); }
  .feature-btn.open { background: var(--neon); color: #000; box-shadow: 0 0 14px var(--neon); }
  .feature-btn.special { color: var(--accent); border-color: var(--accent); font-weight: bold; }
  .feature-btn.special.open { background: var(--accent); color: #000; box-shadow: 0 0 14px var(--accent); }

  /* ============================== KEYBOARD ============================== */
  .keyboard-wrap { background: #000; border-top: 1px solid var(--neon-dim); flex-shrink: 0; position: relative; }
  .keyboard-control { display: flex; align-items: center; gap: 10px; padding: 5px 10px; border-bottom: 1px solid var(--neon-dim); }
  .keyboard-control .size-slider { flex: 1; }
  .keyboard {
    position: relative; background: #000; overflow: hidden; transition: height 0.2s ease;
    user-select: none; touch-action: none;
  }
  .keyboard-inner { position: absolute; top: 0; bottom: 0; }
  .pkey {
    position: absolute; top: 0; bottom: 0;
    border: 1px solid var(--neon-dim);
    cursor: pointer;
    transition: background 0.05s ease;
  }
  .pkey.white { background: var(--white-key); }
  .pkey.black { background: var(--black-key); z-index: 2; }
  .pkey.held { background: var(--neon) !important; box-shadow: 0 0 18px var(--neon), inset 0 0 12px rgba(255,255,255,0.4); }
  .pkey.lit { box-shadow: 0 0 14px var(--neon), inset 0 0 10px rgba(0,255,208,0.5); }
  .pkey.lit.white { background: rgba(0,255,208,0.4) !important; }
  .pkey.lit.black { background: rgba(0,255,208,0.7) !important; }
  .pkey.build-on { background: var(--accent) !important; box-shadow: 0 0 14px var(--accent); }
  .pkey-label { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); font-size: 8px; color: #000; font-family: 'Share Tech Mono', monospace; pointer-events: none; opacity: 0.5; }

  /* ============================== WINDOWS ============================== */
  .window {
    position: absolute;
    background: rgba(0, 8, 6, 0.92);
    border: 1px solid var(--neon);
    box-shadow: 0 0 14px rgba(0,255,208,0.4), inset 0 0 12px rgba(0,255,208,0.08);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    min-width: 200px; min-height: 120px;
    display: flex; flex-direction: column;
    color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 12px;
  }
  .window-header {
    background: #000; border-bottom: 1px solid var(--neon-dim);
    padding: 6px 10px; display: flex; justify-content: space-between; align-items: center;
    cursor: move; font-family: 'Press Start 2P', monospace; font-size: 9px; letter-spacing: 0.05em;
    color: var(--neon); text-shadow: 0 0 6px var(--neon-dim);
  }
  .window-close {
    color: var(--accent); padding: 0 4px; font-size: 14px;
  }
  .window-body { padding: 10px; overflow: auto; flex: 1; }
  .window-resize {
    position: absolute; right: 0; bottom: 0; width: 14px; height: 14px;
    cursor: nwse-resize;
    background: linear-gradient(135deg, transparent 50%, var(--neon) 50%, var(--neon) 60%, transparent 60%, transparent 70%, var(--neon) 70%, var(--neon) 80%, transparent 80%);
  }

  /* ============================== CONTROLS ============================== */
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .row label { font-size: 10px; color: var(--neon-dim); letter-spacing: 0.06em; min-width: 60px; }
  .knob {
    width: 50px; height: 50px; border: 1px solid var(--neon); border-radius: 50%;
    position: relative; background: radial-gradient(circle, #001a16, #000);
    box-shadow: 0 0 6px rgba(0,255,208,0.4);
    cursor: ns-resize;
  }
  .knob-indicator {
    position: absolute; top: 4px; left: 50%; width: 2px; height: 16px;
    background: var(--neon); transform-origin: center 21px; transform: translateX(-50%);
    box-shadow: 0 0 4px var(--neon);
  }
  .knob-label { font-size: 9px; color: var(--neon-dim); text-align: center; margin-top: 2px; letter-spacing: 0.05em; }
  .knob-value { font-size: 9px; color: var(--neon); text-align: center; margin-top: 1px; }
  .knob-wrap { display: flex; flex-direction: column; align-items: center; }
  .grid-knobs { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 10px; }

  .pill {
    padding: 4px 10px; border: 1px solid var(--neon-dim); color: var(--neon); background: #000;
    font-size: 10px; letter-spacing: 0.05em;
  }
  .pill.on { background: var(--neon); color: #000; }
  .pill.accent { color: var(--accent); border-color: var(--accent); }
  .pill.accent.on { background: var(--accent); color: #000; }

  .patch-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
  .patch-btn {
    padding: 6px 8px; border: 1px solid var(--neon-dim); color: var(--text); background: #000;
    font-size: 10px; text-align: left;
  }
  .patch-btn:hover, .patch-btn:active { box-shadow: 0 0 6px var(--neon); border-color: var(--neon); }
  .patch-btn.active { background: var(--neon); color: #000; border-color: var(--neon); }
  .bank-tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
  .bank-tab { padding: 5px 8px; border: 1px solid var(--neon-dim); color: var(--neon); font-size: 9px; }
  .bank-tab.active { background: var(--neon); color: #000; }

  /* ============================== PAD SAMPLER ============================== */
  .pads-grid { display: grid; gap: 8px; padding: 4px; }
  .pad {
    position: relative; aspect-ratio: 1 / 1; min-height: 60px;
    border: 2px solid var(--neon-dim); color: var(--neon);
    background: #050a09; font-size: 9px; padding: 3px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: all 0.08s ease; cursor: pointer;
    text-align: center; word-break: break-word;
  }
  .pad.armed { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .pad.playing { background: rgba(0,255,208,0.6); color: #000; transform: translateZ(-6px) scale(0.95); box-shadow: 0 0 20px var(--neon), inset 0 0 14px var(--neon); }
  .pad.cycle-current { border-color: var(--neon); box-shadow: 0 0 8px var(--neon); }
  .pad.muted { opacity: 0.3; }
  .pad-toggle { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border: 1px solid var(--neon-dim); background: #000; cursor: pointer; }
  .pad-toggle.on { background: var(--neon); }
  .pad-name { font-size: 8px; opacity: 0.8; }
  .sampler-editor { border:1px solid var(--neon-dim); padding:8px; margin:8px 0; background:rgba(0,255,208,0.04); }
  .pad.editor-selected { border-color: var(--accent); box-shadow:0 0 14px var(--accent), inset 0 0 10px rgba(255,77,210,.15); }
  .pad.dragging { opacity:.55; transform:scale(.96); }
  .pad-drag-grip { font-size:10px; color:var(--accent); letter-spacing:.2em; }
  .mini-input { width:80px; background:#000; color:var(--neon); border:1px solid var(--neon-dim); padding:4px; font-family:inherit; font-size:10px; }


  /* ============================== CHORD BANK ============================== */
  .chord-letter-tabs { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
  .chord-letter-tab { padding: 3px 7px; border: 1px solid var(--neon-dim); color: var(--neon); font-size: 10px; }
  .chord-letter-tab.active { background: var(--neon); color: #000; }
  .chord-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 4px; }
  .chord-btn { padding: 4px; border: 1px solid var(--neon-dim); color: var(--text); font-size: 10px; background: #000; }
  .chord-btn:hover, .chord-btn:active { background: var(--neon-dim); color: #000; }

  /* ============================== 3D SOUND ============================== */
  .threed-canvas-wrap { position: relative; width: 100%; aspect-ratio: 4/3; border: 1px solid var(--neon-dim); background: #000; overflow: hidden; }
  .threed-canvas-wrap canvas { width: 100%; height: 100%; display: block; }
  .threed-orb {
    position: absolute; width: 28px; height: 28px; border-radius: 50%;
    background: radial-gradient(circle, var(--neon), transparent);
    box-shadow: 0 0 24px var(--neon), 0 0 48px var(--neon);
    cursor: grab; transform: translate(-50%, -50%);
    transition: box-shadow 0.15s;
  }
  .threed-orb.selected { box-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent); }
  .threed-orb.center { background: radial-gradient(circle, var(--accent), transparent); }
  .threed-orb-label { position:absolute; left:50%; top:100%; transform:translateX(-50%); margin-top:3px; font-size:8px; color:var(--neon); white-space:nowrap; text-shadow:0 0 8px var(--neon); pointer-events:none; }
  .threed-orb-depth { position:absolute; right:-18px; top:50%; transform:translateY(-50%); width:12px; height:2px; background:var(--neon); box-shadow:0 0 8px var(--neon); pointer-events:none; }
  .threed-panel { border:1px solid var(--neon-dim); background:rgba(0,255,208,.04); padding:8px; margin-top:8px; }
  .threed-mode-row { display: flex; gap: 4px; margin-bottom: 8px; }

  /* ============================== MOD WHEEL ============================== */
  .modwheel-wrap { display: flex; gap: 20px; padding: 10px; }
  .mod-slider {
    width: 50px; height: 200px; background: #000; border: 1px solid var(--neon-dim); position: relative;
    cursor: pointer;
  }
  .mod-slider-handle {
    position: absolute; left: 0; right: 0; height: 14px; background: var(--neon);
    box-shadow: 0 0 12px var(--neon); cursor: ns-resize;
  }
  .mod-slider-label { text-align: center; font-size: 10px; color: var(--neon-dim); margin-top: 4px; letter-spacing: 0.05em; }

  /* ============================== COLOR PICKER ============================== */
  .color-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .color-row label { font-size: 10px; color: var(--neon-dim); min-width: 80px; letter-spacing: 0.04em; }
  .color-row input[type="color"] { width: 40px; height: 30px; border: 1px solid var(--neon-dim); background: #000; cursor: pointer; }

  /* ============================== SHORTCUTS ============================== */
  .shortcut-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; }
  .shortcut-item { padding: 6px; border: 1px solid var(--neon-dim); display: flex; justify-content: space-between; font-size: 10px; }
  .shortcut-key { color: var(--neon); font-weight: bold; padding: 1px 6px; background: rgba(0,255,208,0.1); border: 1px solid var(--neon-dim); }

  /* helpers */
  .scroll { overflow: auto; }
  .scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--neon-dim); }
  .scroll::-webkit-scrollbar-track { background: #000; }
  .hidden { display: none !important; }
  .small { font-size: 9px; }
  .title-sm { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--neon); margin-bottom: 6px; letter-spacing: 0.05em; }
  .divider { height: 1px; background: var(--neon-dim); margin: 8px 0; opacity: 0.5; }
</style>
</head>
<body>

const AE = {
  ready: false,
  // master & FX
  master: null,
  eqLow: null, eqMid: null, eqHi: null,
  filter: null, drive: null,
  chorus: null, phaser: null, tremolo: null, delay: null, reverb: null,
  threeInput: null, threeReverb: null, threeShimmer: null, threeDelay: null, threeSparkle: null, threeAir: null, threeGain: null,
  // synth
  voices: {}, // midi -> {node, env, ...} for poly
  currentPatch: null,
  voiceCount: 0,
  // per-pad players
  padPlayers: {},
  init() {
    if (this.ready) return;
    Tone.start();
    this.master = new Tone.Gain(0.7).toDestination();
    this.reverb = new Tone.Reverb({ decay: 3, wet: 0.25 }).connect(this.master);
    this.delay = new Tone.FeedbackDelay({ delayTime: 0.3, feedback: 0.25, wet: 0.2 }).connect(this.reverb);
    this.tremolo = new Tone.Tremolo({ frequency: 4, depth: 0 }).start().connect(this.delay);
    this.phaser = new Tone.Phaser({ frequency: 0.5, octaves: 0, baseFrequency: 600 }).connect(this.tremolo);
    this.chorus = new Tone.Chorus({ frequency: 1.5, delayTime: 3.5, depth: 0, wet: 0 }).start().connect(this.phaser);
    this.drive = new Tone.Distortion({ distortion: 0, wet: 0 }).connect(this.chorus);
    this.filter = new Tone.Filter({ frequency: 12000, type: 'lowpass', Q: 0 }).connect(this.drive);
    this.eqHi = new Tone.Filter({ frequency: 5000, type: 'highshelf', gain: 0 }).connect(this.filter);
    this.eqMid = new Tone.Filter({ frequency: 1000, type: 'peaking', Q: 1, gain: 0 }).connect(this.eqHi);
    this.eqLow = new Tone.Filter({ frequency: 200, type: 'lowshelf', gain: 0 }).connect(this.eqMid);

    // 3D sound chain (parallel wet layer fed by the real keys + sampler pads)
    this.threeInput = new Tone.Gain(1);
    this.threeGain = new Tone.Gain(0).connect(this.master);
    this.threeReverb = new Tone.Reverb({ decay: 12, preDelay: 0.04, wet: 0.95 }).connect(this.threeGain);
    this.threeShimmer = new Tone.PitchShift({ pitch: 12, windowSize: 0.1, delayTime: 0.03, feedback: 0.35, wet: 0.75 }).connect(this.threeReverb);
    this.threeSparkle = new Tone.FeedbackDelay({ delayTime: '16n.', feedback: 0.42, wet: 0.45 }).connect(this.threeShimmer);
    this.threeAir = new Tone.Filter({ frequency: 6500, type: 'highshelf', gain: 8 }).connect(this.threeSparkle);
    this.threeDelay = new Tone.PingPongDelay({ delayTime: '8n.', feedback: 0.7, wet: 0.75 }).connect(this.threeAir);
    this.threeInput.connect(this.threeDelay);
    this.eqLow.connect(this.threeInput);

    // analyser for visualizer
    this.analyser = new Tone.Analyser('waveform', 512);
    this.master.connect(this.analyser);

    this.ready = true;
  },
  voicesInput() { return this.eqLow; },
  // build a fresh voice given patch + midi
  buildVoice(patch, midi) {
    const freq = midiToFreq(midi);
    const env = new Tone.AmplitudeEnvelope({
      attack:patch.amp[0], decay:patch.amp[1], sustain:patch.amp[2], release:patch.amp[3]
    });
    env.connect(this.voicesInput());

    if (patch.kind === 'fm') {
      const carrier = new Tone.Oscillator(freq, 'sine').start();
      const mod = new Tone.Oscillator(freq * (patch.harm||1), 'sine').start();
      const modGain = new Tone.Gain(0);
      const modEnv = new Tone.AmplitudeEnvelope({
        attack:patch.modEnv[0], decay:patch.modEnv[1], sustain:patch.modEnv[2], release:patch.modEnv[3]
      });
      mod.connect(modGain);
      modGain.connect(modEnv);
      // modulation depth proportional to freq for FM-style results
      const depth = freq * (patch.modIdx || 1);
      modEnv.connect(carrier.frequency);
      modGain.gain.value = depth;
      carrier.connect(env);
      modEnv.triggerAttack();
      env.triggerAttack();
      return { kind:'fm', env, modEnv, nodes:[carrier, mod, modGain] };
    }
    // mono/pad sub-style
    const o1 = new Tone.Oscillator(freq, patch.osc).start();
    let o2 = null;
    if (patch.detune) {
      o2 = new Tone.Oscillator(freq, patch.osc).start();
      o2.detune.value = patch.detune;
    }
    let sub = null;
    if (patch.subOct) {
      sub = new Tone.Oscillator(freq/2, 'sine').start();
    }
    const oscGain = new Tone.Gain(0.6);
    o1.connect(oscGain);
    if (o2) o2.connect(oscGain);
    if (sub) sub.connect(oscGain);

    const filt = new Tone.Filter({ frequency: patch.filt, Q: patch.q, type:'lowpass' });
    const fenvAmt = patch.fenv || 0;
    const filtMod = new Tone.Gain(fenvAmt);
    const filtEnv = new Tone.AmplitudeEnvelope({ attack:0.005, decay:0.3, sustain:0.4, release:0.4 });
    filtEnv.connect(filtMod);
    filtMod.connect(filt.frequency);
    oscGain.connect(filt);
    filt.connect(env);
    filtEnv.triggerAttack();
    env.triggerAttack();
    return { kind:'sub', env, filtEnv, nodes:[o1, o2, sub, oscGain, filt, filtMod].filter(Boolean) };
  },
  noteOn(midi, patch) {
    if (!this.ready) return;
    if (this.voices[midi]) this.noteOff(midi, true);
    const voice = this.buildVoice(patch, midi);
    this.voices[midi] = voice;
    this.voiceCount++;
  },
  noteOff(midi, immediate=false) {
    const v = this.voices[midi];
    if (!v) return;
    v.env.triggerRelease();
    if (v.modEnv) v.modEnv.triggerRelease();
    if (v.filtEnv) v.filtEnv.triggerRelease();
    const release = (v.env.release || 0.5) * 1000 + 100;
    setTimeout(()=> {
      try { v.nodes.forEach(n => n && n.dispose && n.dispose()); v.env.dispose(); v.modEnv && v.modEnv.dispose(); v.filtEnv && v.filtEnv.dispose(); } catch(e){}
      if (this.voices[midi] === v) { delete this.voices[midi]; this.voiceCount--; }
    }, release);
  },
  allNotesOff() {
    Object.keys(this.voices).forEach(k => this.noteOff(+k));
  },
  killAll() {
    Object.values(this.voices).forEach(v => {
      try { v.nodes.forEach(n => n && n.dispose && n.dispose()); v.env.dispose(); v.modEnv && v.modEnv.dispose(); v.filtEnv && v.filtEnv.dispose(); } catch(e){}
    });
    this.voices = {}; this.voiceCount = 0;
  },
  setMaster(v) { if (this.ready) this.master.gain.value = v; },
  applyDetune(cents) {
    Object.values(this.voices).forEach(v => {
      v.nodes.forEach(n => { if (n && n.detune && typeof n.detune.value === 'number') n.detune.value = cents; });
    });
  },
  setFX({ eqLow, eqMid, eqHi, drive, chorus, phaser, tremolo, delayTime, delayFb, delayWet, reverb, reverbWet, filterCut, filterRes }) {
    if (!this.ready) return;
    this.eqLow.gain.value = eqLow;
    this.eqMid.gain.value = eqMid;
    this.eqHi.gain.value = eqHi;
    this.drive.distortion = drive;
    this.drive.wet.value = drive > 0 ? Math.min(1, drive * 1.5) : 0;
    this.chorus.depth = chorus;
    this.chorus.wet.value = chorus > 0 ? Math.min(1, chorus) : 0;
    this.phaser.octaves = phaser * 3;
    this.tremolo.depth.value = tremolo;
    this.delay.delayTime.value = delayTime;
    this.delay.feedback.value = delayFb;
    this.delay.wet.value = delayWet;
    this.reverb.wet.value = reverbWet;
    this.filter.frequency.value = filterCut;
    this.filter.Q.value = filterRes;
  },
  set3D(on, points=[], selectedIdx=0) {
    if (!this.ready) return;
    const pts = Array.isArray(points) && points.length ? points : [{x:.5,y:.5,z:.5,mix:.7,shimmer:.7,space:.8,delay:.55,feedback:.55,glitter:.55,air:.65}];
    const avg = (key, fallback=0) => pts.reduce((sum,p)=>sum + (Number.isFinite(+p[key]) ? +p[key] : fallback), 0) / pts.length;
    const main = pts[selectedIdx] || pts[0];
    const wet = Math.min(1.25, avg('mix', .65) + pts.length * 0.035);
    const space = avg('space', .8);
    const delay = avg('delay', .55);
    const feedback = Math.min(.92, avg('feedback', .55) + pts.length * .025);
    const shimmer = avg('shimmer', .75);
    const glitter = avg('glitter', .55);
    const air = avg('air', .65);
    const depth = avg('z', .5);
    this.threeGain.gain.rampTo(on ? wet : 0, 0.18);
    this.threeReverb.decay = 5 + space * 16;
    this.threeReverb.wet.rampTo(on ? Math.min(.98, .45 + space*.55) : 0, 0.12);
    this.threeShimmer.pitch = (main.flavor || '').toLowerCase().includes('sub') ? -12 : (7 + Math.round(shimmer * 17));
    this.threeShimmer.feedback.value = Math.min(.85, .15 + shimmer*.58);
    this.threeShimmer.wet.rampTo(on ? Math.min(.96, .25 + shimmer*.7) : 0, 0.12);
    this.threeDelay.delayTime.value = 0.05 + delay * 0.65;
    this.threeDelay.feedback.rampTo(on ? feedback : 0, 0.12);
    this.threeDelay.wet.rampTo(on ? Math.min(.95, .25 + delay*.65) : 0, 0.12);
    this.threeSparkle.feedback.rampTo(on ? Math.min(.9, .18 + glitter*.72) : 0, 0.12);
    this.threeSparkle.wet.rampTo(on ? Math.min(.85, .18 + glitter*.62) : 0, 0.12);
    this.threeAir.frequency.rampTo(2500 + air * 10500, 0.12);
    this.threeAir.gain.rampTo(on ? (2 + air*14 + depth*4) : 0, 0.12);
  },
};

const Homepage = ({ onEnter }) => {
  const vizRef = useRef(null);
  const [litPads, setLitPads] = useState([false,false,false,false]);

  // Animated pads
  useEffect(() => {
    const t = setInterval(() => {
      setLitPads(p => p.map(() => Math.random() > 0.5));
    }, 400);
    return () => clearInterval(t);
  }, []);

  // Demo visualizer canvas (procedural audio waveform)
  useEffect(() => {
    const canvas = vizRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width = canvas.clientWidth * 2;
    const h = canvas.height = canvas.clientHeight * 2;
    let raf = 0, t = 0;
    const draw = () => {
      t += 0.05;
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
      ctx.strokeStyle = '#00ffd0'; ctx.lineWidth = 3; ctx.shadowColor = '#00ffd0'; ctx.shadowBlur = 16;
      ctx.beginPath();
      for (let i = 0; i < w; i += 4) {
        const y = h/2 + Math.sin(i*0.02 + t)*30 + Math.sin(i*0.05 + t*1.3)*15 + Math.sin(i*0.11 + t*0.6)*10;
        if (i === 0) ctx.moveTo(i, y); else ctx.lineTo(i, y);
      }
      ctx.stroke();
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(raf);
  }, []);

  // 16-bit piano keys
  const whiteKeys = Array.from({length:15});
  const blackKeys = [0,1,3,4,5,7,8,10,11,12]; // positions in 15-white range

      sym: list[i % list.length],

      dy: -(50 + Math.random()*120) + 'px',
      delay: Math.random()*8 + 's',
      size: 14 + Math.random()*16 + 'px',
    }));
  }, []);

  return (
    <div className="home">
      <div className="home-grid"></div>
      {symbols.map((s,i) => (
        <span key={i} className="home-symbol"
          style={{left:s.left+'%', top:s.top+'%', fontSize:s.size, animationDelay:s.delay, '--dx':s.dx, '--dy':s.dy}}>
          {s.sym}
        </span>
      ))}

      <h1 className="home-title">{"HOLD IT DOWN".split("").map((ch,i)=><span key={i}>{ch===" "?"\u00A0":ch}</span>)}</h1>
      <div className="home-subtitle">— NEON SYNTH WORKSTATION —</div>

      <div className="home-piano">
        {whiteKeys.map((_,i) => (
          <div key={'w'+i} className="key white" style={{left: (i/15*100)+'%'}}>
            <div className="key-glow" style={{opacity: 0.3 + Math.sin(i*0.5)*0.2}}></div>
          </div>
        ))}
        {blackKeys.map((p,i) => (
          <div key={'b'+i} className="key black" style={{left: ((p+0.7)/15*100)+'%'}}></div>
        ))}
      </div>

      <div className="home-pads">
        {litPads.map((on,i) => (
          <div key={i} className={'home-pad' + (on?' lit':'')}></div>
        ))}
      </div>

      <div className="home-knobs">
        <div className="home-knob" style={{animation:'spin 4s linear infinite', '--spin':'0deg'}}>
          <style>{`@keyframes spin { from { transform: rotate(-130deg); } to { transform: rotate(130deg); } }`}</style>

/* ============================================================
   DRAGGABLE / RESIZABLE WINDOW
   ============================================================ */
const DraggableWindow = ({ title, children, onClose, x, y, w, h, onMove, onResize, z, onFocus }) => {
  const dragRef = useRef(null);
  const clamp = (nx, ny, nw=w, nh=h) => {
    const margin = 8;
    const vw = window.innerWidth || 1024;
    const vh = window.innerHeight || 768;
    const maxX = Math.max(margin, vw - Math.min(nw, vw - margin) - margin);
    const maxY = Math.max(margin, vh - 72);
    return {
      x: Math.max(margin, Math.min(nx, maxX)),
      y: Math.max(margin, Math.min(ny, maxY))
    };
  };
  const startDrag = (e) => {
    e.preventDefault(); onFocus();
    const t = e.touches ? e.touches[0] : e;
    const startX = t.clientX, startY = t.clientY, ox = x, oy = y;
    const move = (ev) => {
      ev.preventDefault && ev.preventDefault();
      const m = ev.touches ? ev.touches[0] : ev;
      const c = clamp(ox + (m.clientX - startX), oy + (m.clientY - startY));
      onMove(c.x, c.y);
    };
    const up = () => {
      window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
    };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
  };
  const startResize = (e) => {
    e.preventDefault(); e.stopPropagation(); onFocus();
    const t = e.touches ? e.touches[0] : e;
    const startX = t.clientX, startY = t.clientY, ow = w, oh = h;
    const move = (ev) => {
      ev.preventDefault && ev.preventDefault();
      const m = ev.touches ? ev.touches[0] : ev;
      onResize(Math.max(200, ow + (m.clientX - startX)), Math.max(120, oh + (m.clientY - startY)));
    };
    const up = () => {
      window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
    };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
  };
  const c = clamp(x,y);
  if (c.x !== x || c.y !== y) setTimeout(()=>onMove(c.x,c.y),0);
  return (
    <div className="window" style={{left:c.x, top:c.y, width:w, height:h, zIndex:z}} onMouseDown={onFocus} onTouchStart={onFocus}>
      <div className="window-header" onMouseDown={startDrag} onTouchStart={startDrag} ref={dragRef}>
        <span>{title}</span>
        <button className="window-close" onClick={onClose}>✕</button>
      </div>
      <div className="window-body scroll">{children}</div>
      <div className="window-resize" onMouseDown={startResize} onTouchStart={startResize}></div>
    </div>
  );
};

/* ============================================================
   KNOB COMPONENT
   ============================================================ */
const Knob = ({ label, value, min=0, max=1, step=0.01, onChange, format }) => {
  const ref = useRef(null);
  const start = (e) => {
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const startY = t.clientY, ov = value;
    const move = (ev) => {
      const m = ev.touches ? ev.touches[0] : ev;
      const dy = startY - m.clientY;
      const range = max - min;
      let nv = ov + (dy / 100) * range;
      nv = Math.max(min, Math.min(max, Math.round(nv / step) * step));
      onChange(nv);
    };
    const up = () => {
      window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
    };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
  };
  const norm = (value - min) / (max - min);
  const deg = -130 + norm * 260;
  return (
    <div className="knob-wrap">
      <div className="knob" ref={ref} onMouseDown={start} onTouchStart={start}>
        <div className="knob-indicator" style={{transform:`translateX(-50%) rotate(${deg}deg)`}}></div>
      </div>
      <div className="knob-label">{label}</div>
      <div className="knob-value">{format ? format(value) : value.toFixed(2)}</div>
    </div>
  );
};

/* ============================================================
   PIANO KEYS COMPONENT
   ============================================================ */
const PianoKeys = ({ height, startMidi, numKeys, activeMidis, litMidis, buildLitMidis, chromatic, onNoteOn, onNoteOff, scrollEnabled, onScroll }) => {
  const wrapRef = useRef(null);
  const [keyW, setKeyW] = useState(40);

  useEffect(() => {
    const update = () => {
      if (!wrapRef.current) return;
      // count white keys in range
      let wc = 0;
      for (let m = startMidi; m < startMidi + numKeys; m++) if (![1,3,6,8,10].includes(((m%12)+12)%12)) wc++;
      setKeyW(wrapRef.current.clientWidth / wc);
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, [numKeys, startMidi]);

  // Build key layout
  const keys = [];
  let xWhite = 0;
  for (let m = startMidi; m < startMidi + numKeys; m++) {
    const pc = ((m%12)+12)%12;
    const isBlack = [1,3,6,8,10].includes(pc);
    if (!isBlack) {
      keys.push({ midi:m, isBlack:false, x: xWhite*keyW, w: keyW });
      xWhite++;
    } else {
      const x = xWhite*keyW - keyW*0.3;
      keys.push({ midi:m, isBlack:true, x: x, w: keyW*0.6 });
    }
  }

  // chromatic view: all equal-width bars
  let chromKeys = null;
  if (chromatic) {
    const bw = wrapRef.current ? wrapRef.current.clientWidth / numKeys : 30;
    chromKeys = [];
    for (let i=0; i<numKeys; i++) {
      chromKeys.push({ midi: startMidi+i, x: i*bw, w: bw });
    }
  }

  // Pointer handling for sliding across keys
  const heldRef = useRef(new Set());
  const handleStart = (m) => (e) => {
    e.preventDefault();
    onNoteOn(m);
    heldRef.current.add(m);
  };
  const handleEnd = (m) => (e) => {
    e.preventDefault();
    onNoteOff(m);
    heldRef.current.delete(m);
  };

  // Horizontal pan/scroll
  const onPanStart = (e) => {
    if (!scrollEnabled) return;
    const t = e.touches ? e.touches[0] : e;
    const startX = t.clientX; let dx = 0;
    const move = (ev) => {
      const m = ev.touches ? ev.touches[0] : ev;
      dx = m.clientX - startX;
      if (Math.abs(dx) > keyW) {
        const steps = Math.round(dx / keyW);
        onScroll(-steps);
      }
    };
    const up = () => {
      window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
    };
    if (scrollEnabled) {
      window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
      window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
    }
  };

  return (
    <div className="keyboard" style={{height}} ref={wrapRef}
         onMouseDown={scrollEnabled ? onPanStart : undefined}
         onTouchStart={scrollEnabled ? onPanStart : undefined}>
      {!chromatic && (
        <div className="keyboard-inner" style={{left:0, right:0}}>
          {keys.filter(k=>!k.isBlack).map(k => (
            <div key={k.midi}
                 className={'pkey white' + (activeMidis.has(k.midi)?' held':'') + (litMidis.has(k.midi)?' lit':'') + (buildLitMidis.has(k.midi)?' build-on':'')}
                 style={{left:k.x, width:k.w}}
                 onMouseDown={handleStart(k.midi)} onMouseUp={handleEnd(k.midi)} onMouseLeave={handleEnd(k.midi)}
                 onTouchStart={handleStart(k.midi)} onTouchEnd={handleEnd(k.midi)}>
              {midiToName(k.midi).startsWith('C') && <div className="pkey-label">{midiToName(k.midi)}</div>}
            </div>
          ))}
          {keys.filter(k=>k.isBlack).map(k => (
            <div key={k.midi}
                 className={'pkey black' + (activeMidis.has(k.midi)?' held':'') + (litMidis.has(k.midi)?' lit':'') + (buildLitMidis.has(k.midi)?' build-on':'')}
                 style={{left:k.x, width:k.w, height:'60%'}}
                 onMouseDown={handleStart(k.midi)} onMouseUp={handleEnd(k.midi)} onMouseLeave={handleEnd(k.midi)}
                 onTouchStart={handleStart(k.midi)} onTouchEnd={handleEnd(k.midi)}>
            </div>
          ))}
        </div>
      )}
      {chromatic && chromKeys && (
        <div className="keyboard-inner" style={{left:0, right:0}}>
          {chromKeys.map((k,i) => {
            const isBlack = [1,3,6,8,10].includes(((k.midi%12)+12)%12);
            return (
              <div key={k.midi}
                   className={'pkey ' + (isBlack?'black':'white') + (activeMidis.has(k.midi)?' held':'') + (litMidis.has(k.midi)?' lit':'') + (buildLitMidis.has(k.midi)?' build-on':'')}
                   style={{left:k.x, width:k.w-1}}
                   onMouseDown={handleStart(k.midi)} onMouseUp={handleEnd(k.midi)} onMouseLeave={handleEnd(k.midi)}
                   onTouchStart={handleStart(k.midi)} onTouchEnd={handleEnd(k.midi)}>
                <div className="pkey-label" style={{color: isBlack ? '#fff' : '#000'}}>{midiToName(k.midi)}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ============================================================
   FX RACK WINDOW
   ============================================================ */
const FXRack = ({ fx, setFx }) => {
  const set = (k) => (v) => setFx({ ...fx, [k]: v });
  return (
    <div>
      <div className="title-sm">— EQ —</div>

/* ============================================================
   PADS / SAMPLER WINDOW
   ============================================================ */
const PadsSamplerWindow = ({
  pads, setPads, currentPadIdx, setCurrentPadIdx,
  cycleEnabled, setCycleEnabled, cycleMode, setCycleMode,
  armed, setArmed, sustainHold, setSustainHold,
  onTriggerPad, onLoadChord, buildMode, setBuildMode, playingPads,
}) => {
  const fileRef = useRef(null);
  const [arrowFocused, setArrowFocused] = useState(false);
  const [editorMode, setEditorMode] = useState(false);
  const [draggingIdx, setDraggingIdx] = useState(null);
  const selectedPad = pads[currentPadIdx] || {};
  const padBase = (p={}) => ({ name:'Empty', enabled:true, type:'empty', data:null, chord:null, transpose:0, ...p });
  const updatePad = (i, patch) => setPads(prev => prev.map((p,idx)=>idx===i ? padBase({...p, ...patch}) : p));

  const addPad = () => setPads([...pads, padBase()]);
  const removePad = () => { if (pads.length > 1) setPads(pads.slice(0, -1)); };
  const clearAll = () => setPads([]);
  const duplicate = (i) => {
    const copy = { ...pads[i] };
    setPads([...pads.slice(0,i+1), copy, ...pads.slice(i+1)]);
  };
  const deletePad = (i) => { setPads(pads.filter((_,j)=>j!==i)); setCurrentPadIdx(Math.max(0, Math.min(currentPadIdx, pads.length-2))); };
  const togglePad = (i) => updatePad(i, { enabled: !pads[i].enabled });
  const movePad = (from, to) => {
    if (from === to || from == null || to == null) return;
    setPads(prev => {
      const np = prev.slice();
      const [item] = np.splice(from,1);
      np.splice(to,0,item);
      return np;
    });
    setCurrentPadIdx(to);
  };

  const onUpload = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    files.forEach((file, k) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const data = ev.target.result;
        Tone.context.decodeAudioData(data.slice(0)).then(buffer => {
          setPads(prev => {
            const np = prev.slice();
            const padIdx = currentPadIdx + k;
            const nextPad = padBase({ ...(np[padIdx]||{}), name:file.name.replace(/\.[^.]+$/,'').slice(0,20), type:'audio', data:buffer, chord:null, sourceType:file.type.startsWith('video/')?'video':'audio', transpose: np[padIdx]?.transpose || 0 });
            if (padIdx < np.length) np[padIdx] = nextPad; else np.push(nextPad);
            return np;
          });
        }).catch((err)=>{
          alert('This browser could not extract playable audio from: '+file.name+'\nTry WAV, MP3, M4A, AAC, AIFF, or an MP4/MOV with standard AAC audio.');
        });
      };
      reader.readAsArrayBuffer(file);
    });
    e.target.value = '';
  };
  const selectedTranspose = selectedPad.transpose || 0;
  const setSelectedTranspose = (v) => updatePad(currentPadIdx, { transpose: Math.max(-24, Math.min(24, parseInt(v||0,10))) });

  return (
    <div>
      <div className="row">
        <button className="pill" onClick={addPad}>+ ADD</button>
        <button className="pill" onClick={removePad}>− REM</button>
        <button className="pill" onClick={clearAll}>CLEAR ALL</button>
        <button className="pill" onClick={()=>fileRef.current.click()}>UPLOAD AUDIO / VIDEO</button>
        <input ref={fileRef} type="file" accept="audio/*,video/*,.mp3,.wav,.aif,.aiff,.m4a,.aac,.ogg,.flac,.mp4,.mov,.m4v,.webm" multiple onChange={onUpload} style={{display:'none'}}/>
      </div>
      <div className="row">
        <button className={'pill' + (sustainHold?' on':'')} onClick={()=>setSustainHold(!sustainHold)}>SUSTAIN</button>
        <button className={'pill accent' + (armed?' on':'')} onClick={()=>setArmed(!armed)}>● ARM</button>
        <button className={'pill' + (cycleEnabled?' on':'')} onClick={()=>setCycleEnabled(!cycleEnabled)}>AUTO ADVANCE</button>
        <button className="pill" onClick={()=>setCycleMode(cycleMode==='loop'?'pingpong':'loop')}>{cycleMode==='loop'?'LOOP':'PING-PONG'}</button>
        <span className="small" style={{color:'var(--neon-dim)'}}>Keys: ←/→ or [/], Enter plays selected pad</span>
        <button className={'pill accent' + (editorMode?' on':'')} onClick={()=>setEditorMode(!editorMode)}>EDITOR MODE</button>
      </div>
      <div className="row">
        <button className={'pill accent' + (buildMode?' on':'')} onClick={()=>setBuildMode(!buildMode)}>BUILD MODE</button>
        <button className="pill" onClick={()=>onLoadChord(currentPadIdx)}>LOAD CURRENT CHORD → SELECTED PAD</button>
      </div>
      <div onClick={()=>setArrowFocused(!arrowFocused)} style={{border:'1px solid '+(arrowFocused?'var(--accent)':'var(--neon-dim)'), padding:'6px', display:'flex', gap:'8px', alignItems:'center', marginBottom:'8px', cursor:'pointer'}}>
        <button className="pill" onClick={(e)=>{e.stopPropagation(); setCurrentPadIdx(Math.max(0,currentPadIdx-1))}}>◀</button>
        <span className="small">Selected pad: {currentPadIdx+1} / {pads.length} {arrowFocused ? '• Keyboard ←/→ active' : '• Tap to focus'}</span>
        <button className="pill" onClick={(e)=>{e.stopPropagation(); setCurrentPadIdx(Math.min(pads.length-1,currentPadIdx+1))}}>▶</button>
      </div>
      {editorMode && (
        <div className="sampler-editor">
          <div className="title-sm">PAD EDITOR — PAD {currentPadIdx+1}</div>
          <div className="row">
            <label>Name</label>
            <input className="mini-input" value={selectedPad.name || ''} onChange={e=>updatePad(currentPadIdx,{name:e.target.value.slice(0,20)})}/>
            <label>Type</label><span className="small">{selectedPad.type || 'empty'}{selectedPad.sourceType==='video'?' • video audio':''}</span>
          </div>
          <div className="row">
            <label>Transpose</label>
            <button className="pill" onClick={()=>setSelectedTranspose(selectedTranspose-1)}>− SEMI</button>
            <input className="mini-input" type="number" min="-24" max="24" value={selectedTranspose} onChange={e=>setSelectedTranspose(e.target.value)}/>
            <button className="pill" onClick={()=>setSelectedTranspose(selectedTranspose+1)}>+ SEMI</button>
            <button className="pill" onClick={()=>setSelectedTranspose(0)}>RESET</button>
          </div>
          <div className="small" style={{color:'var(--neon-dim)'}}>Transpose is stored per pad only. For audio/video audio it changes playback rate; for notes and chord shapes it shifts every note in that selected pad.</div>
          <div className="divider"></div>
          <div className="small" style={{color:'var(--neon-dim)'}}>To reorder pads, drag a pad while Editor Mode is on. The grid will reorient automatically as you slide.</div>
        </div>
      )}
      <div className="pads-grid" style={{gridTemplateColumns:`repeat(${Math.min(4, Math.max(1,pads.length))}, 1fr)`}}>
        {pads.map((padRaw, i) => {
          const pad = padBase(padRaw);
          return <div key={i}
            draggable={editorMode}
            onDragStart={(e)=>{ if(!editorMode) return; setDraggingIdx(i); e.dataTransfer.effectAllowed='move'; }}
            onDragOver={(e)=>{ if(editorMode){ e.preventDefault(); e.dataTransfer.dropEffect='move'; } }}
            onDrop={(e)=>{ e.preventDefault(); movePad(draggingIdx, i); setDraggingIdx(null); }}
            onDragEnd={()=>setDraggingIdx(null)}
            className={'pad' + (i===currentPadIdx?' cycle-current':'') + (playingPads && playingPads.has(i)?' playing':'') + (editorMode && i===currentPadIdx?' editor-selected':'') + (!pad.enabled?' muted':'') + (armed && i===currentPadIdx?' armed':'') + (draggingIdx===i?' dragging':'')}
            onMouseDown={(e)=>{ e.preventDefault(); setCurrentPadIdx(i); if(!editorMode) onTriggerPad(i, true); }}
            onMouseUp={()=>{ if(!editorMode) onTriggerPad(i, false); }}
            onMouseLeave={()=>{ if(!editorMode) onTriggerPad(i, false); }}
            onTouchStart={(e)=>{ setCurrentPadIdx(i); if(!editorMode){ e.preventDefault(); onTriggerPad(i, true); } }}
            onTouchEnd={()=>{ if(!editorMode) onTriggerPad(i, false); }}>
            <div className="pad-toggle" onClick={(e)=>{e.stopPropagation(); togglePad(i)}} style={{background: pad.enabled ? 'var(--neon)' : '#000'}}></div>
            {editorMode && <div className="pad-drag-grip">⋮⋮</div>}
            <span className="pad-name">{i+1}. {pad.name}</span>
            <span className="small" style={{fontSize:8,color:'var(--neon-dim)'}}>TR {pad.transpose>0?'+':''}{pad.transpose||0} • {pad.type}</span>
            <div className="row" style={{justifyContent:'center', gap:4, marginBottom:0}}>
              <span style={{fontSize:8, color:'var(--neon-dim)'}} onClick={(e)=>{e.stopPropagation(); deletePad(i)}}>×</span>
              <span style={{fontSize:8, color:'var(--neon-dim)'}} onClick={(e)=>{e.stopPropagation(); duplicate(i)}}>⎘</span>
            </div>
          </div>
        })}
      </div>
    </div>
  );
};

/* ============================================================
   MOD WHEEL WINDOW
   ============================================================ */
const ModWheelWindow = ({ modValue, setModValue, pitchValue, setPitchValue, bendRange, setBendRange, glideMs, setGlideMs, modEffect, setModEffect }) => {
  const onMod = (e) => {
    const t = e.touches ? e.touches[0] : e;
    const startY = t.clientY, ov = modValue;
    const move = (ev) => {
      const m = ev.touches ? ev.touches[0] : ev;
      const dy = startY - m.clientY;
      setModValue(Math.max(0, Math.min(1, ov + dy/200)));
    };
    const up = () => {
      window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
    };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
  };
  const onPitch = (e) => {
    const t = e.touches ? e.touches[0] : e;
    const startY = t.clientY, ov = pitchValue;
    const move = (ev) => {
      const m = ev.touches ? ev.touches[0] : ev;
      const dy = startY - m.clientY;
      setPitchValue(Math.max(-1, Math.min(1, ov + dy/100)));
    };
    const up = () => {
      setPitchValue(0); // springs back
      window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
    };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
  };

  const effects = ['Shimmer Reverb','Tape Wow','Detune Choir','Filter Sweep','Ring Mod','Bit Crush','Vibrato','Auto Wah','Tremolo Cosmic','Chorus Wide'];

  return (
    <div className="modwheel-wrap">
      <div>
        <div className="mod-slider" onMouseDown={onMod} onTouchStart={onMod}>
          <div className="mod-slider-handle" style={{bottom: (modValue*100) + '%'}}></div>
        </div>
        <div className="mod-slider-label">MOD<br/>{(modValue*100|0)}%</div>
      </div>
      <div>
        <div className="mod-slider" onMouseDown={onPitch} onTouchStart={onPitch}>
          <div className="mod-slider-handle" style={{bottom: (50 + pitchValue*50) + '%'}}></div>
        </div>
        <div className="mod-slider-label">PITCH<br/>{pitchValue>0?'+':''}{(pitchValue*bendRange).toFixed(1)}st</div>
      </div>
      <div style={{flex:1}}>
        <div className="title-sm">SETTINGS</div>
        <div className="row">
          <label>Bend Range</label>
          <input type="range" min="1" max="24" value={bendRange} onChange={e=>setBendRange(+e.target.value)} />
          <span>{bendRange} st</span>
        </div>
        <div className="row">
          <label>Glide (ms)</label>
          <input type="range" min="0" max="500" step="10" value={glideMs} onChange={e=>setGlideMs(+e.target.value)} />
          <span>{glideMs}</span>
        </div>
        <div className="divider"></div>
        <div className="title-sm">MOD EFFECT</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'4px'}}>
          {effects.map(fx => (
            <button key={fx} className={'pill' + (modEffect===fx?' on':'')} onClick={()=>setModEffect(fx)}>{fx}</button>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ============================================================
   3D SOUND WINDOW
   ============================================================ */
const ThreeDSoundWindow = ({ enabled, setEnabled, mode, setMode, points, setPoints, selectedPoint, setSelectedPoint, onDice }) => {
  const wrapRef = useRef(null);
  const canvasRef = useRef(null);

  // Background visual
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const draw = () => {
      const w = canvas.width = canvas.clientWidth * 2;
      const h = canvas.height = canvas.clientHeight * 2;
      ctx.clearRect(0,0,w,h);
      ctx.strokeStyle = 'rgba(0,255,208,0.4)';
      ctx.lineWidth = 1;
      if (mode === 'stage') {
        // stage with speakers
        ctx.strokeRect(w*0.15, h*0.65, w*0.7, h*0.25);
        // speakers
        ctx.strokeRect(w*0.05, h*0.5, w*0.1, h*0.35);
        ctx.strokeRect(w*0.85, h*0.5, w*0.1, h*0.35);
        ctx.beginPath();
        ctx.arc(w*0.5, h*0.78, w*0.05, 0, Math.PI*2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(0,255,208,0.5)';
        ctx.font = '24px monospace';
        ctx.fillText('STAGE', w*0.42, h*0.95);
      } else if (mode === 'head') {
        // head silhouette
        ctx.beginPath();
        ctx.ellipse(w/2, h/2, w*0.18, h*0.28, 0, 0, Math.PI*2);
        ctx.stroke();
        // ears
        ctx.beginPath();
        ctx.ellipse(w*0.32, h/2, w*0.03, h*0.06, 0, 0, Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(w*0.68, h/2, w*0.03, h*0.06, 0, 0, Math.PI*2);
        ctx.stroke();
        // nose direction
        ctx.beginPath(); ctx.moveTo(w/2, h*0.22); ctx.lineTo(w/2-8, h*0.27); ctx.lineTo(w/2+8, h*0.27); ctx.closePath(); ctx.stroke();
      } else {
        // grid
        for (let i = 0; i <= 10; i++) {
          ctx.beginPath(); ctx.moveTo((i/10)*w, 0); ctx.lineTo((i/10)*w, h); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0, (i/10)*h); ctx.lineTo(w, (i/10)*h); ctx.stroke();
        }
        // center crosshair
        ctx.strokeStyle = 'rgba(0,255,208,0.8)';
        ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();
      }
    };
    draw();
    const obs = new ResizeObserver(draw);
    obs.observe(canvas);
    return () => obs.disconnect();
  }, [mode]);

  const dragPoint = (idx) => (e) => {
    e.preventDefault(); e.stopPropagation();
    setSelectedPoint(idx);
    const t = e.touches ? e.touches[0] : e;
    const startX = t.clientX, startY = t.clientY;
    const ox = points[idx].x, oy = points[idx].y;
    const rect = wrapRef.current.getBoundingClientRect();
    const move = (ev) => {
      const m = ev.touches ? ev.touches[0] : ev;
      const nx = Math.max(0, Math.min(1, ox + (m.clientX - startX)/rect.width));
      const ny = Math.max(0, Math.min(1, oy + (m.clientY - startY)/rect.height));
      const np = points.slice();
      np[idx] = { ...np[idx], x:nx, y:ny };
      setPoints(np);
    };
    const up = () => {
      window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
    };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
  };

  const makePoint = (flavor, isCenter=false) => {
    const presets = {
      'Shimmer':   {shimmer:.92, space:.82, delay:.45, feedback:.62, glitter:.82, air:.88, mix:.78, z:.55},
      'Aurora':    {shimmer:.72, space:.95, delay:.62, feedback:.72, glitter:.48, air:.76, mix:.72, z:.75},
      'Cosmic':    {shimmer:.84, space:.9,  delay:.78, feedback:.8,  glitter:.68, air:.72, mix:.8,  z:.82},
      'Halo':      {shimmer:.55, space:.86, delay:.34, feedback:.45, glitter:.38, air:.92, mix:.62, z:.5},
      'Glitter':   {shimmer:.88, space:.62, delay:.28, feedback:.52, glitter:.96, air:.95, mix:.7,  z:.42},
      'Sub Sky':   {shimmer:.25, space:.88, delay:.7,  feedback:.76, glitter:.24, air:.42, mix:.74, z:.9},
      'Dream Echo':{shimmer:.68, space:.82, delay:.86, feedback:.82, glitter:.52, air:.7,  mix:.76, z:.68},
      'Vapor':     {shimmer:.58, space:.98, delay:.55, feedback:.64, glitter:.58, air:.86, mix:.68, z:.7},
      'Crystal':   {shimmer:.95, space:.72, delay:.38, feedback:.58, glitter:.9,  air:.98, mix:.72, z:.48},
      'Phantom':   {shimmer:.46, space:.94, delay:.74, feedback:.74, glitter:.36, air:.62, mix:.66, z:.86},
      'Air Bell':  {shimmer:.98, space:.7,  delay:.3,  feedback:.5,  glitter:.86, air:1,   mix:.68, z:.38},
      'Tape Choir':{shimmer:.52, space:.78, delay:.66, feedback:.7,  glitter:.3,  air:.58, mix:.64, z:.62},
    };
    const base = presets[flavor] || presets.Shimmer;
    return { x:0.18 + Math.random()*0.64, y:0.18 + Math.random()*0.64, flavor, isCenter, ...base };
  };
  const addPoint = () => {
    const flavors = ['Shimmer','Aurora','Cosmic','Halo','Glitter','Sub Sky','Dream Echo','Vapor','Crystal','Phantom','Air Bell','Tape Choir'];
    const fl = flavors[Math.floor(Math.random()*flavors.length)];
    const next = [...points, makePoint(fl, false)];
    setPoints(next);
    setSelectedPoint(next.length-1);
  };
  const removePoint = () => {
    if (points.length > 1) {
      const next = points.filter((_,i)=>i!==selectedPoint);
      setPoints(next);
      setSelectedPoint(Math.max(0, Math.min(selectedPoint, next.length-1)));
    }
  };
  const updateSelected = (patch) => {
    if (selectedPoint == null || !points[selectedPoint]) return;
    const np = points.slice();
    np[selectedPoint] = { ...np[selectedPoint], ...patch };
    setPoints(np);
  };

  return (
    <div>
      <div className="row">
        <button className={'pill accent' + (enabled?' on':'')} onClick={()=>setEnabled(!enabled)}>{enabled?'● ON':'○ OFF'}</button>
        <button className="pill" onClick={addPoint}>+ POINT</button>
        <button className="pill" onClick={removePoint}>− POINT</button>
        <button className="pill accent" onClick={onDice}>🎲 DICE</button>
      </div>
      <div className="threed-mode-row">
        {['stage','head','grid'].map(m => (
          <button key={m} className={'pill' + (mode===m?' on':'')} onClick={()=>setMode(m)}>{m.toUpperCase()}</button>
        ))}
      </div>
      <div className="threed-canvas-wrap" ref={wrapRef}>
        <canvas ref={canvasRef}></canvas>
        {points.map((p, i) => (
          <div key={i}
               className={'threed-orb' + (i===selectedPoint?' selected':'') + (p.isCenter?' center':'')}
               style={{left: (p.x*100)+'%', top: (p.y*100)+'%'}}
               onMouseDown={dragPoint(i)} onTouchStart={dragPoint(i)}
               title={`${p.flavor} • X ${(p.x*100|0)} Y ${(p.y*100|0)} Depth ${((p.z ?? .5)*100|0)}`}>
            <span className="threed-orb-depth" style={{width: (10 + ((p.z ?? .5)*22))+'px', opacity:.35 + ((p.z ?? .5)*.65)}}></span>
            <span className="threed-orb-label">{i+1} {p.flavor}</span>
          </div>
        ))}
      </div>
      {selectedPoint != null && points[selectedPoint] && (
        <div className="threed-panel">
          <div className="title-sm">POINT {selectedPoint+1}: {points[selectedPoint].flavor}</div>
          <div className="row">
            <label>Flavor</label>
            <select className="mini-input" value={points[selectedPoint].flavor} onChange={e=>updateSelected({flavor:e.target.value})}>
              {['Shimmer','Aurora','Cosmic','Halo','Glitter','Sub Sky','Dream Echo','Vapor','Crystal','Phantom','Air Bell','Tape Choir','Center Shimmer'].map(f=><option key={f} value={f}>{f}</option>)}
            </select>
            <span className="small" style={{color:'var(--neon-dim)'}}>X {(points[selectedPoint].x*100|0)} • Y {(points[selectedPoint].y*100|0)}</span>
          </div>
          {[['mix','Mix'],['z','Depth'],['shimmer','Shimmer'],['space','Space'],['delay','Echo Time'],['feedback','Feedback'],['glitter','Glitter'],['air','Air']].map(([key,label]) => (
            <div className="row" key={key}>
              <label>{label}</label>
              <input type="range" min="0" max="1" step="0.01" value={points[selectedPoint][key] ?? .5}
                onChange={e=>updateSelected({[key]:+e.target.value})} />
              <span>{(((points[selectedPoint][key] ?? .5)*100)|0)}%</span>
            </div>
          ))}
          <div className="small" style={{color:'var(--neon-dim)'}}>Each orb has its own flavor and parameter values. Drag the orb to place it in the field, then shape its mix, shimmer, feedback, glitter, air, and depth here.</div>
        </div>
      )}
    </div>
  );
};
